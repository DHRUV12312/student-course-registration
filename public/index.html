<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Course Registration</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>Student Course Registration</h1>
    </header>

    <main class="container">
      <section id="auth-section" class="card">
        <div class="tabs">
          <button id="login-tab" class="tab active">Login</button>
          <button id="register-tab" class="tab">Register</button>
        </div>

        <form id="login-form" class="form active">
          <h2>Student Login</h2>
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" required />
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" minlength="6" required />
          </div>
          <button type="submit" class="btn primary">Login</button>
          <p id="login-message" class="message"></p>
        </form>

        <form id="register-form" class="form">
          <h2>New Student Registration</h2>
          <div class="form-group">
            <label for="reg-name">Full Name</label>
            <input type="text" id="reg-name" required />
          </div>
          <div class="form-group">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" required />
          </div>
          <div class="form-group">
            <label for="reg-password">Password</label>
            <input type="password" id="reg-password" minlength="6" required />
          </div>
          <button type="submit" class="btn primary">Register</button>
          <p id="register-message" class="message"></p>
        </form>
      </section>

      <section id="dashboard" class="card hidden">
        <div class="dashboard-header">
          <div>
            <h2>Welcome, <span id="student-name"></span></h2>
            <p id="student-email" class="muted"></p>
          </div>
          <button id="logout-btn" class="btn">Logout</button>
        </div>

        <div class="dashboard-grid">
          <div>
            <h3>Available Courses</h3>
            <table>
              <thead>
                <tr>
                  <th>Code</th>
                  <th>Title</th>
                  <th>Credits</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="courses-table-body"></tbody>
            </table>
            <p id="courses-message" class="message"></p>

            <h3 style="margin-top: 1.5rem;">Add Course (Admin)</h3>
            <form id="add-course-form" class="form-inline">
              <div class="form-group">
                <label for="course-code">Code</label>
                <input type="text" id="course-code" placeholder="e.g. CS101" required />
              </div>
              <div class="form-group">
                <label for="course-title">Title</label>
                <input type="text" id="course-title" placeholder="Course title" required />
              </div>
              <div class="form-group">
                <label for="course-credits">Credits</label>
                <input type="number" id="course-credits" min="1" max="10" value="3" required />
              </div>
              <div class="form-group">
                <label for="course-description">Description</label>
                <input type="text" id="course-description" placeholder="Short description" />
              </div>
              <button type="submit" class="btn primary small">Add Course</button>
              <p id="add-course-message" class="message"></p>
            </form>
          </div>

          <div>
            <h3>My Enrollments</h3>
            <table>
              <thead>
                <tr>
                  <th>Code</th>
                  <th>Title</th>
                  <th>Enrolled On</th>
                </tr>
              </thead>
              <tbody id="enrollments-table-body"></tbody>
            </table>
            <p id="enrollments-message" class="message"></p>
          </div>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <p>&copy; <span id="year"></span> College Course Registration System</p>
    </footer>

    <script src="js/app.js"></script>
  </body>
  </html>
